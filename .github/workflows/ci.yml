name: Mamba Video Stream CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd mamba-video-stream
          pip install -r requirements.txt pytest

      - name: Run unit tests
        run: |
          cd mamba-video-stream
          pytest -v
